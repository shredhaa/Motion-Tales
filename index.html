<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Simon Says</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #e0ff00;
  --black: #0a0a0a;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background:black;
  color:white;
  font-family:'IM Fell English', serif;
  overflow:hidden;
  cursor:none;
}

/* cursor */

#cursor{
  position:fixed;
  width:10px;
  height:10px;
  background:white;
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
}

/* preview */

#preview-box{
  position:fixed;
  top:18px;
  left:24px;
  width:90px;
  height:64px;
  border:1px solid rgba(255,255,255,0.2);
  overflow:hidden;
  z-index:200;
}

#preview-label{
  position:absolute;
  top:4px;
  left:6px;
  font-size:9px;
  opacity:.5;
}

#preview-img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ui */

#topbar{
  position:fixed;
  top:0;
  width:100%;
  padding:18px 24px;
  display:flex;
  justify-content:space-between;
  pointer-events:none;
}

#bottombar{
  position:fixed;
  bottom:0;
  width:100%;
  padding:18px 24px;
  display:flex;
  justify-content:space-between;
}

#sketch-container{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
}

.nav-arrow{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
}

#arrow-left{ left:10px; }
#arrow-right{ right:10px; }

</style>
</head>

<body>

<div id="cursor"></div>

<!-- preview -->
<div id="preview-box">
  <span id="preview-label">preview</span>
  <img id="preview-img" src="gifs/draw.gif">
</div>

<!-- top -->
<div id="topbar">
<div id="sketch-title">—</div>
<div>Simon Says</div>
</div>

<!-- bottom -->
<div id="bottombar">
<div id="caption">—</div>
<div id="page-counter">01 / 04</div>
</div>

<button class="nav-arrow" id="arrow-left" onclick="navigate(-1)">‹</button>
<button class="nav-arrow" id="arrow-right" onclick="navigate(1)">›</button>

<div id="sketch-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script> 
  <script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/addons/p5.sound.min.js"></script> 
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script> 
  <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>

<script>

let globalFontSize = 20
let globalStrokeWeight = 1

const pages = [
 { title:'Draw with finger', caption:'(Trace with finger)' },
 { title:'Pinch & scale', caption:'(Pinch to resize)' },
 { title:'Blow to scatter', caption:'(Blow letters)' },
 { title:'Nose repels words', caption:'(Move face)' },
]

const previews = [
 "gifs/draw.gif",
 "gifs/pinch.gif",
 "gifs/blow.gif",
 "gifs/nose.gif"
]

let currentPage = 0
let currentSketch = null

function updateUI(index){

 document.getElementById("sketch-title").textContent =
 pages[index].title

 document.getElementById("caption").textContent =
 pages[index].caption

 document.getElementById("page-counter").textContent =
 String(index+1).padStart(2,"0")+" / 04"

 document.getElementById("preview-img").src =
 previews[index]
}

function navigate(dir){

 let next = (currentPage + dir + 4) % 4
 goTo(next)

}

function goTo(index){

 if(index===currentPage) return

 loadSketch(index)

 currentPage=index

 updateUI(index)
}

function loadSketch(index){

 if(currentSketch){
  currentSketch.remove()
 }

 const container =
 document.getElementById("sketch-container")

 container.innerHTML=""

 const sketchFns =
 [sketchDraw,sketchPinch,sketchBlow,sketchNose]

 currentSketch =
 new p5(sketchFns[index],container)
}

document.addEventListener("mousemove",e=>{
 let c=document.getElementById("cursor")
 c.style.left=e.clientX+"px"
 c.style.top=e.clientY+"px"
})

</script>

<script src="sketch-draw.js"></script>
<script src="sketch-pinch.js"></script>
<script src="sketch-blow.js"></script>
<script src="sketch-nose.js"></script>

<script>

updateUI(0)
loadSketch(0)

</script>

</body>
</html>
