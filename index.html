<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Simon Says</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">

<style>

:root {
  --bg: #e0ff00;
  --black: #0a0a0a;
  --accent: #ff6600;
  --purple: #e052ff;
  --green: #00c800;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: var(--black);
  color:white;
  font-family:'IM Fell English', serif;
  overflow:hidden;
  height:100vh;
  width:100vw;
  cursor:none;
}

/* cursor */

#cursor{
  position:fixed;
  width:10px;
  height:10px;
  background:white;
  border-radius:50%;
  pointer-events:none;
  z-index:9999;
  transform:translate(-50%,-50%);
  mix-blend-mode:difference;
}

/* top bar */

#topbar{
  position:fixed;
  top:0;
  width:100%;
  padding:18px 24px 0;
  display:flex;
  justify-content:space-between;
  pointer-events:none;
}

/* preview */

#preview-box{
  position:fixed;
  top:18px;
  left:24px;
  width:90px;
  height:64px;
  border:1px solid rgba(255,255,255,0.2);
  overflow:hidden;
  z-index:200;
}

#preview-label{
  position:absolute;
  top:4px;
  left:6px;
  font-size:9px;
  opacity:.4;
}

#preview-box img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* bottom */

#bottombar{
  position:fixed;
  bottom:0;
  width:100%;
  padding:0 24px 18px;
  display:flex;
  justify-content:space-between;
}

/* arrows */

.nav-arrow{
  position:fixed;
  top:50%;
  transform:translateY(-50%);
  font-size:28px;
  background:none;
  border:none;
  color:white;
  cursor:pointer;
  opacity:.4;
}

#arrow-left{ left:8px; }
#arrow-right{ right:8px; }

#sketch-container{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
}

.dot{
  width:5px;
  height:5px;
  border-radius:50%;
  background:white;
  opacity:.2;
  cursor:pointer;
}

.dot.active{
  opacity:1;
  transform:scale(1.4);
}

</style>
</head>

<body>

<div id="cursor"></div>

<div id="preview-box">
  <span id="preview-label">preview</span>
  <img id="preview-img" src="gifs/draw.gif">
</div>

<div id="topbar">
  <div>
    <div id="sketch-title">—</div>
  </div>
  <div>Simon Says</div>
</div>

<button id="arrow-left" class="nav-arrow" onclick="navigate(-1)">‹</button>
<button id="arrow-right" class="nav-arrow" onclick="navigate(1)">›</button>

<div id="sketch-container"></div>

<div id="bottombar">
  <div id="caption">—</div>
  <div id="page-counter">01 / 04</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/p5@1.11.11/lib/p5.js"></script>
<script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>

<script>

let globalFontSize = 20
let globalStrokeWeight = 1

function onSliderChange(type,val){
 if(type==='size') globalFontSize=parseFloat(val)
 if(type==='weight') globalStrokeWeight=parseFloat(val)
}

const pages=[
 {title:'Draw with finger',caption:'(Trace a path with your index finger)'},
 {title:'Pinch & scale',caption:'(Pinch thumb & index to resize and move)'},
 {title:'Blow to scatter',caption:'(Blow into the camera to scatter letters)'},
 {title:'Nose repels words',caption:'(Move your face to push words away)'},
]

const previews=[
 "gifs/draw.gif",
 "gifs/pinch.gif",
 "gifs/blow.gif",
 "gifs/nose.gif"
]

let currentPage=0
let currentSketch=null

function updateUI(index){

 document.getElementById('sketch-title').textContent=
 pages[index].title

 document.getElementById('caption').textContent=
 pages[index].caption

 document.getElementById('page-counter').textContent=
 String(index+1).padStart(2,'0')+' / 04'

 document.getElementById('preview-img').src=
 previews[index]
}

function navigate(dir){
 let next=(currentPage+dir+4)%4
 goTo(next)
}

function goTo(index){

 if(index===currentPage) return

 loadSketch(index)

 currentPage=index

 updateUI(index)
}

function loadSketch(index){

 if(currentSketch){
  currentSketch.remove()
 }

 const container=
 document.getElementById('sketch-container')

 container.innerHTML=''

 const sketchFns=[
  sketchDraw,
  sketchPinch,
  sketchBlow,
  sketchNose
 ]

 currentSketch=
 new p5(sketchFns[index],container)
}

document.addEventListener('mousemove',e=>{
 const c=document.getElementById('cursor')
 c.style.left=e.clientX+'px'
 c.style.top=e.clientY+'px'
})

</script>

<script src="sketch-draw.js"></script>
<script src="sketch-pinch.js"></script>
<script src="sketch-blow.js"></script>
<script src="sketch-nose.js"></script>

<script>

updateUI(0)
loadSketch(0)

</script>

</body>
</html>
